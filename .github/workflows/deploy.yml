name: Deploy Hugo to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build
        run: hugo --minify
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v5
        with:
          personal_token: ${{ secrets.GH_PAT_023 }}
          external_repository: zmeyche/zmeyche-blog.github.io
          publish_branch: main
          publish_dir: ./public
          cname: zmeyche.com
