#      weight = 40
    [[languages.en.menus.footer]]
      name = "License - © CC BY 4.0"
      url = "https://creativecommons.org/licenses/by/4.0/legalcode"
      weight = 10
  [languages.bg]
	languageName = "Български"
	contentDir = "content"
	weight = 2
    [[languages.bg.menus.main]]
      name = 'Начало'
      pageRef = '/'
      weight = 10
    [[languages.bg.menus.main]]
      name = 'Публикации'
      pageRef = '/posts'
      weight = 20
#    [[languages.bg.menus.main]]
#      name = 'Рецепти'
#      pageRef = '/categories/recipes'
#      weight = 30
#    [[languages.bg.menus.main]]
#      name = 'Други блогове'
#      pageRef = '/other-blogs'
#      weight = 40
    [[languages.bg.menus.footer]]
      name = "Права и лиценз - © CC BY 4.0"
      url = "https://creativecommons.org/licenses/by/4.0/legalcode"
      weight = 10

[caches]
  [caches.images]
    dir = ':cacheDir/images'
	
