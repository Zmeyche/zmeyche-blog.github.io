baseURL = 'http://zmeyche.com/'
languageCode = 'en-us'
title = 'zmeyche.com'
theme = "hugo-primer-blog"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[params]
  sidebar = false
  recentPostsCount = 5
  defaultTheme = "auto"
  dateFormat = "2006-01-02"
  showReadingTime = true
  showAuthor = true
  showShareButtons = true
  primaryColor = "#DA025D"  # Purple
 
# [markup]
#  defaultMarkdownHandler = 'blackFriday'
#  [markup.blackFriday]
#    hrefTargetBlank = true
	
 # Sidebar modules - order determines display order
  # Available: recentPosts, tags, categories, archive, links (+ custom partials)
  [[params.sidebarModules]]
    partial = "recentPosts"

  [[params.sidebarModules]]
    partial = "tags"

  [[params.sidebarModules]]
    partial = "archive"

# [params.social]
# bluesky = "zmeyche.com"
# github = "zmeyche"


  # Custom favicon (optional)
  #faviconIco = "favicon.ico"
  #faviconPng = "favicon.png"


# languages
[languages]
  [languages.en]
    languageName = "English"	
    contentDir = "content"
    weight = 1
    [[languages.en.menus.main]]
      name = 'Home'
      pageRef = '/'
      weight = 10
    [[languages.en.menus.main]]
      name = 'Posts'
      pageRef = '/posts'
      weight = 20
#    [[languages.en.menus.main]]
#      name = 'Recipes'
